<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>PocketDOS spike</title>
  <link rel="stylesheet" href="js-dos.css" />
  <style>
    html, body { margin: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
    /* Inset the whole js-dos UI inside the safe area so the sidebar / controls
       don't slide under the notch, Dynamic Island, or home indicator. */
    #app {
      position: absolute;
      top: env(safe-area-inset-top, 0);
      bottom: env(safe-area-inset-bottom, 0);
      left: env(safe-area-inset-left, 0);
      right: env(safe-area-inset-right, 0);
    }
    #hud {
      position: fixed; top: env(safe-area-inset-top, 0); left: 0; z-index: 99999;
      color: #0f0; font: 12px/1.4 ui-monospace, Menlo, monospace;
      background: rgba(0,0,0,.55); padding: 3px 8px; pointer-events: none;
      max-width: 100%; white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="hud">PocketDOS spike — booting…</div>

  <!-- Preload the emulators runtime (id matches what js-dos checks, so it isn't
       loaded twice) so we can use emulators.bundle() to convert raw zips. -->
  <script id="emulators-js" src="emulators/emulators.js"></script>
  <!-- js-dos production bundle exposes a global `Dos` (window.Dos). -->
  <script src="js-dos.js"></script>
  <script>
    "use strict";
    const hud = document.getElementById("hud");
    const log = (m) => { console.log(m); hud.textContent = m; };

    // Point the emulators runtime at our bundled, same-origin assets.
    if (typeof emulators !== "undefined") {
      emulators.pathPrefix = "emulators/";
      emulators.pathSuffix = "";
    }

    // Turn a raw game .zip into a runnable js-dos bundle on the fly:
    // extract it into a default bundle (which mounts C: and drops to the DOS
    // prompt) and hand js-dos a blob URL. .jsdos files load unchanged.
    async function resolveBundleUrl(url) {
      if (!url || !/\.zip(\?|#|$)/i.test(url)) return url;
      log("converting zip → bundle…");
      if (typeof emulators === "undefined" || !emulators.bundle) {
        throw new Error("emulators runtime not loaded");
      }
      const bundle = await emulators.bundle();
      bundle.extract(url);              // default: path "/", type "zip"
      const u8 = await bundle.toUint8Array();
      return URL.createObjectURL(new Blob([u8]));
    }

    // ---- Spike toggles -----------------------------------------------------
    // Start conservative (no worker / no offscreen canvas) to maximize the
    // chance the custom-scheme load works; flip these to test performance.
    const USE_WORKER = false;        // true => dosboxWorker (off-main-thread)
    const USE_OFFSCREEN = false;     // requires USE_WORKER = true
    const BACKEND = "dosbox";        // js-dos auto-switches to dosboxX for Win9x configs
    const GAME_URL = "games/game.jsdos"; // drop a .jsdos here to autostart
    // -----------------------------------------------------------------------

    // Lightweight on-screen FPS meter (rAF cadence ~ render rate).
    let frames = 0, lastT = performance.now(), fps = 0;
    (function tick() {
      frames++;
      const now = performance.now();
      if (now - lastT >= 1000) { fps = frames; frames = 0; lastT = now; }
      requestAnimationFrame(tick);
    })();

    // Lockdown Mode disables WebAssembly entirely (decided behavior: warn).
    if (typeof WebAssembly === "undefined") {
      log("WebAssembly is unavailable.\nIs iOS Lockdown Mode enabled? Disable it for PocketDOS, or use the native (sideload) build.");
      throw new Error("WASM unavailable");
    }

    function startDos(url) {
      const options = {
        pathPrefix: "emulators/",   // resolves to pocketdos://app/emulators/
        backend: BACKEND,
        workerThread: USE_WORKER,
        offscreenCanvas: USE_OFFSCREEN,
        autoStart: true,
        thinSidebar: true,          // narrower sidebar so it fits small screens
        // Spike on-screen keyboard tuned for FPS/DOS games (Wolf3D, Doom):
        // arrows to move, Ctrl to fire, Space to open, Alt strafe, Shift run,
        // 1-5 weapons, Esc menu, Enter confirm. Open it from the sidebar's
        // keyboard button. (Per-game custom layouts are V1 spec item F33.)
        softKeyboardLayout: [
          "{esc} 1 2 3 4 5 {enter}",
          "{shift} {alt} {space} {ctrl}",
          "{left} {up} {down} {right}",
        ],
        onEvent: (event, arg) => {
          console.log("js-dos event:", event);
          if (event === "emu-ready") log("emulator ready…");
          if (event === "ci-ready") {
            window.ci = arg;
            log("running — ci-ready");
            setInterval(() => {
              try { hud.textContent = "FPS " + fps + "  |  " + arg.width() + "x" + arg.height(); }
              catch (e) { hud.textContent = "FPS " + fps; }
            }, 500);
          }
        },
      };
      if (url) options.url = url;
      window.props = Dos(document.getElementById("app"), options);
    }

    // A ?url= param (set by the native WKUIDelegate when a sockdrive/_blank
    // quick-link is tapped, or for "load by url") takes priority.
    const PARAM_URL = new URLSearchParams(location.search).get("url");

    if (PARAM_URL) {
      log("loading " + PARAM_URL + " …");
      resolveBundleUrl(PARAM_URL)
        .then((resolved) => startDos(resolved))
        .catch((e) => {
          console.error("[panic] zip conversion failed: " + (e && e.message ? e.message : e));
          log("Couldn't convert this zip into a game:\n" + (e && e.message ? e.message : e));
        });
    } else {
      // Autostart a bundled game if present; otherwise load the js-dos UI so we
      // can still confirm the engine boots and import a game via the UI.
      fetch(GAME_URL, { method: "HEAD" })
        .then((r) => {
          if (r.ok) { log("loading " + GAME_URL + " …"); startDos(GAME_URL); }
          else { log("No bundled game.\nAdd Web/games/game.jsdos and rebuild.\nLoading js-dos UI…"); startDos(null); }
        })
        .catch(() => {
          log("No bundled game.\nAdd Web/games/game.jsdos and rebuild.\nLoading js-dos UI…");
          startDos(null);
        });
    }
  </script>
</body>
</html>
