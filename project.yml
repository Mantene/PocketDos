name: PocketDOS
options:
  bundleIdPrefix: com.mantene
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"

packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: "0.9.19"

settings:
  base:
    MARKETING_VERSION: "0.0.1"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    # Set your Apple Developer Team ID here (or in Xcode Signing & Capabilities)
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  PocketDOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
      # Web is a *folder reference* (blue folder) so the directory structure
      # (Web/emulators/..., Web/games/...) is preserved verbatim in the app bundle.
      - path: Web
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mantene.pocketdos
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: Sources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/PocketDOS.entitlements
        TARGETED_DEVICE_FAMILY: "1" # iPhone-only for V1
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    dependencies:
      - package: ZIPFoundation

# A shared scheme so Xcode's Build/Run are available (XcodeGen doesn't create one otherwise).
schemes:
  PocketDOS:
    build:
      targets:
        PocketDOS: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
